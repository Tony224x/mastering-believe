name: Quarkdown sites

# Build des sites de cours Quarkdown (.qd -> HTML statique) et publication
# des bundles portables en assets de GitHub Release.
#
# - push d'un tag v*  : build tous les domaines + cree/maj la Release avec
#                       un bundle tar.gz par domaine (consommable par KaView).
# - pull_request      : build de validation seulement (pas de Release) quand
#                       les sources Quarkdown changent.
# - workflow_dispatch : build manuel a la demande (artefacts telechargeables).

on:
  push:
    tags:
      - "v*"
  pull_request:
    paths:
      - "domains/**/01-theory-qd/**"
      - "quarkdown/**"
      - ".github/workflows/quarkdown-release.yml"
  workflow_dispatch:

permissions:
  contents: write # necessaire pour creer/mettre a jour la Release sur tag

env:
  # Version du CLI Quarkdown utilisee pour le build (asset linux-x64).
  QUARKDOWN_VERSION: "v2.2.0"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install Quarkdown CLI
        run: |
          set -euo pipefail
          url="https://github.com/iamgio/quarkdown/releases/download/${QUARKDOWN_VERSION}/quarkdown-linux-x64.zip"
          echo "Downloading $url"
          curl -fsSL -o /tmp/quarkdown.zip "$url"
          unzip -q /tmp/quarkdown.zip -d "$RUNNER_TEMP/quarkdown-cli"
          bindir="$RUNNER_TEMP/quarkdown-cli/quarkdown/bin"
          chmod +x "$bindir/quarkdown"
          echo "$bindir" >> "$GITHUB_PATH"

      - name: Show versions
        run: |
          java -version
          quarkdown --version

      - name: Build all Quarkdown sites
        run: bash quarkdown/scripts/build-all.sh

      - name: Package bundles
        id: package
        run: |
          set -euo pipefail
          mkdir -p dist
          shopt -s nullglob
          for domain_dir in quarkdown/output-site/*/; do
            domain="$(basename "$domain_dir")"
            # Chaque site vit dans un sous-dossier "Mastering-Believe-<Titre>".
            site_root="$(find "$domain_dir" -mindepth 1 -maxdepth 1 -type d | head -1)"
            if [[ -z "$site_root" || ! -f "$site_root/index.html" ]]; then
              echo "::warning::pas de site exploitable pour $domain (skip)"
              continue
            fi
            # Archive root = racine du site (index.html au top) pour WKWebView.
            tar -czf "dist/${domain}-bundle.tar.gz" -C "$site_root" .
            echo "  packed dist/${domain}-bundle.tar.gz"
          done
          ls -lh dist/

      - name: Upload bundles as workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: quarkdown-bundles
          path: dist/*.tar.gz
          if-no-files-found: error

      - name: Publish bundles to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          notes="Sites de cours Quarkdown (bundles HTML portables, un par domaine).
          Build avec Quarkdown ${QUARKDOWN_VERSION}. Decompresser et ouvrir index.html."
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" dist/*.tar.gz --clobber
          else
            gh release create "$tag" dist/*.tar.gz \
              --title "Mastering Believe — $tag" \
              --notes "$notes"
          fi
